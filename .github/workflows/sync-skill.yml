name: Sync SKILL.md and rules

on:
  push:
    branches: [main]
    paths:
      - skills/missionctl/SKILL.md
      - skills/missioncrew/SKILL.md
      - agents/missioncrew-*.md
      - skills/missionctl-compress/SKILL.md
      - skills/missionctl-compress/scripts/**

concurrency:
  group: sync-skill
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull latest before making changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main

      - name: Sync SKILL.md copies
        run: |
          cp skills/missionctl/SKILL.md plugins/missionctl/skills/missionctl/SKILL.md

      - name: Sync missionctl-compress skill to plugin
        run: |
          # Plugin distribution mirrors source verbatim — no rename, no sed.
          mkdir -p plugins/missionctl/skills/missionctl-compress
          cp skills/missionctl-compress/SKILL.md plugins/missionctl/skills/missionctl-compress/SKILL.md
          rm -rf plugins/missionctl/skills/missionctl-compress/scripts
          cp -r skills/missionctl-compress/scripts plugins/missionctl/skills/missionctl-compress/scripts
          rm -rf plugins/missionctl/skills/missionctl-compress/scripts/__pycache__

      - name: Sync missioncrew skill + agents to plugin
        run: |
          mkdir -p plugins/missionctl/skills/missioncrew plugins/missionctl/agents
          cp skills/missioncrew/SKILL.md plugins/missionctl/skills/missioncrew/SKILL.md
          cp agents/missioncrew-investigator.md plugins/missionctl/agents/missioncrew-investigator.md
          cp agents/missioncrew-builder.md plugins/missionctl/agents/missioncrew-builder.md
          cp agents/missioncrew-reviewer.md plugins/missionctl/agents/missioncrew-reviewer.md

      - name: Rebuild missionctl.skill ZIP
        run: mkdir -p dist && cd skills && zip -r ../dist/missionctl.skill missionctl/

      - name: Commit and push if changed
        run: |
          git add \
            skills/missionctl-compress/ \
            plugins/missionctl/skills/missionctl-compress/ \
            plugins/missionctl/skills/missionctl/SKILL.md \
            plugins/missionctl/skills/missioncrew/SKILL.md \
            plugins/missionctl/agents/missioncrew-investigator.md \
            plugins/missionctl/agents/missioncrew-builder.md \
            plugins/missionctl/agents/missioncrew-reviewer.md \
            dist/missionctl.skill
          git diff --staged --quiet && exit 0
          git commit -m "chore: sync SKILL.md copies [skip ci]"
          git push
