name: Test

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
  workflow_dispatch:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node-test:
    name: Node tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run installer tests
        run: npm test

      - name: Run remaining Node tests
        run: node --test tests/test_caveman_init.js tests/test_caveman_stats.js tests/test_mcp_shrink.js tests/test_repo_local_config.js tests/test_symlink_flag.js

  python-test:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run caveman-compress tests
        run: python -m unittest tests/test_compress_safety.py -v

      - name: Run caveman-compress validation tests
        run: python -m unittest tests/test_validate_inline.py -v

      - name: Run hook tests
        run: python -m unittest tests/test_hooks.py -v
